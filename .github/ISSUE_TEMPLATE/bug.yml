name: Bug report
description: Report a reproducible InstallGlass defect without sensitive data
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve InstallGlass. Do not post real credentials, private package contents, personal data, or unreviewed raw reports. Security vulnerabilities belong in a private report under the Security tab.
  - type: input
    id: version
    attributes:
      label: InstallGlass version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: docker
    attributes:
      label: Docker version
      description: Engine version only; omit account and host details.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS family
      options: [Linux, macOS with Docker Desktop, Windows with Docker Desktop]
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include the expected and actual behavior with sensitive details removed.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal synthetic reproduction
      description: Prefer a tiny package using example.invalid and dummy data.
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I reviewed this issue and removed credentials, personal data, host paths, and private package content.
          required: true
        - label: This is not a security vulnerability requiring private disclosure.
          required: true
